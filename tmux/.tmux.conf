# Enable mouse (important)
set -g mouse on

# Better colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Prefix key (optional but nicer)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Plugins (THIS is the main part)
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'catppuccin/tmux'

# Extra info (CPU, RAM, etc.)
set -g @plugin 'tmux-plugins/tmux-powerline'

# Seamless navigation between nvim and tmux
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (KEEP THIS AT BOTTOM)
run '~/.tmux/plugins/tpm/tpm'
